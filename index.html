<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil d'Archivage des Catalogues</title>
    <style>
        /* --- CSS : Design & Expérience Utilisateur --- */
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --green: #22c55e;
            --orange: #f97316;
            --red: #ef4444;
            --white: #ffffff;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); margin: 0; color: #1e293b; }
        header { background: var(--primary); color: white; padding: 1.5rem; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        #app { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        .card { 
            background: var(--white); padding: 1.5rem; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer;
            transition: all 0.2s ease; border: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 1.1rem; min-height: 80px; text-align: center;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); color: var(--accent); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1.5rem; }

        /* Styles de statut (Couleurs) */
        .status-card { color: white; display: flex; flex-direction: column; gap: 0.5rem; cursor: pointer; border-radius: 8px; padding: 1rem; }
        .green { background-color: var(--green); }
        .orange { background-color: var(--orange); }
        .red { background-color: var(--red); }

        .warning-text { font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 5px; border-radius: 4px; font-weight: normal; margin-top: 5px; }

        .btn-back { 
            background: #64748b; color: white; border: none; padding: 0.6rem 1.2rem; 
            border-radius: 6px; cursor: pointer; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-back:hover { background: #475569; }

        h2 { border-left: 4px solid var(--accent); padding-left: 1rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<header>
    <h1>📚 Archivage des Catalogues</h1>
</header>

<div id="app">
    </div>

<script>
/* ============================================================
   1. BASE DE DONNÉES (À modifier pour ajouter des marques)
   ============================================================ */
const cataloguesData = {
    "Sanitaire": {
        "Grohe": ["2023", "2024", "2025"],
        "Hansgrohe": ["2024", "2025"],
        "Geberit": ["2022", "2024"]
    },
    "Chauffage": {
        "Viessmann": ["2024", "2025"],
        "De Dietrich": ["2023", "2025"],
        "Saunier Duval": ["2024"]
    },
    "Plomberie": {
        "Nicoll": ["2023", "2024"],
        "Viega": ["2024", "2025"]
    }
};

/* ============================================================
   2. LOGIQUE MÉTIER & ÉTAT
   ============================================================ */
let state = { domaine: null, marque: null };

function getStatus(year) {
    const currentYear = new Date().getFullYear();
    const currentMonth = new Date().getMonth(); // 0 = Janvier, 11 = Décembre

    const selectedYear = parseInt(year);

    // Règle 1 : Si l'année est passée -> ROUGE
    if (selectedYear < currentYear) return "red";

    // Règle 2 : Si c'est l'année en cours
    if (selectedYear === currentYear) {
        // Moins de 6 mois (Janvier à Juin inclus) -> VERT
        if (currentMonth < 6) return "green";
        // Plus de 6 mois (Juillet à Décembre) -> ORANGE
        else return "orange";
    }

    // Règle 3 : Année future -> VERT (nouveau catalogue)
    return "green";
}

/* ============================================================
   3. MOTEUR DE RENDU (L'interface dynamique)
   ============================================================ */
const app = document.getElementById("app");

function renderDomaines() {
    app.innerHTML = `<h2>1. Sélectionnez un Domaine</h2>`;
    const grid = document.createElement("div");
    grid.className = "grid";

    Object.keys(cataloguesData).forEach(domaine => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerText = domaine;
        card.onclick = () => { state.domaine = domaine; renderMarques(); };
        grid.appendChild(card);
    });
    app.appendChild(grid);
}

function renderMarques() {
    app.innerHTML = `<button class="btn-back" onclick="renderDomaines()">⬅ Retour aux Domaines</button>`;
    app.innerHTML += `<h2>2. Marques : ${state.domaine}</h2>`;
    
    const grid = document.createElement("div");
    grid.className = "grid";

    Object.keys(cataloguesData[state.domaine]).forEach(marque => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerText = marque;
        card.onclick = () => { state.marque = marque; renderAnnees(); };
        grid.appendChild(card);
    });
    app.appendChild(grid);
}

function renderAnnees() {
    app.innerHTML = `<button class="btn-back" onclick="renderMarques()">⬅ Retour aux Marques</button>`;
    app.innerHTML += `<h2>3. Choisir l'édition (${state.marque})</h2>`;
    
    const grid = document.createElement("div");
    grid.className = "grid";

    cataloguesData[state.domaine][state.marque].forEach(year => {
        const status = getStatus(year);
        const card = document.createElement("div");
        card.className = `status-card ${status}`;
        
        let warningHTML = (status === "red") ? `<div class="warning-text">⚠ Attention : Validité à confirmer avec le fournisseur !</div>` : "";
        
        card.innerHTML = `<strong>Édition ${year}</strong> ${warningHTML}`;
        
        // Action : Simule l'ouverture d'un PDF
        card.onclick = () => {
            alert(`Ouverture du PDF : catalogues/${state.domaine.toLowerCase()}/${state.marque.toLowerCase()}/${year}/catalogue.pdf`);
            // Pour un vrai lien : window.open(`catalogues/${state.domaine}/${state.marque}/${year}/catalogue.pdf`, '_blank');
        };
        grid.appendChild(card);
    });
    app.appendChild(grid);
}

// Lancement initial
renderDomaines();

</script>
</body>
</html>
