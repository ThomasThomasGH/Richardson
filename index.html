<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDSON | B.P.O. v6.0 CORE_AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f4; --surface: #ffffff; --primary: #001a33; --accent: #e30613;
            --text: #001a33; --border: #d1d1d1; --grid-color: rgba(0, 26, 51, 0.05);
            --online-green: #00ff88; --offline-red: #ff4444;
            --card-hover: #001a33; --card-hover-text: #ffffff;
            --glow-power: 0px; --ai-panel-w: 350px;
        }

        [data-theme="dark"] {
            --bg: #050505; --surface: #0a0a0a; --primary: #ffffff;
            --text: #e0e0e0; --border: #1a1a1a; --grid-color: rgba(255, 255, 255, 0.02);
            --glow-power: 15px;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 !important; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; font-family: 'Inter', sans-serif; margin: 0; color: var(--text); min-height: 100vh;
            overflow-x: hidden; display: flex; flex-direction: column;
        }

        /* --- ANIMATIONS --- */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes scanLineWhite {
            0% { top: -10%; opacity: 0; }
            40% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- UI COMPONENTS --- */
        header {
            height: 80px; background: var(--surface); border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; padding: 0 40px; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 4px; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; margin-left: auto; }
        .action-btn {
            background: var(--primary); color: var(--surface); border: none; padding: 10px 18px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        /* --- MAIN LAYOUT --- */
        .main-wrapper { display: grid; grid-template-columns: 280px 1fr var(--ai-panel-w); min-height: calc(100vh - 80px); }

        aside {
            border-right: 1px solid var(--border); background: var(--surface); padding: 30px;
            display: flex; flex-direction: column; position: sticky; top: 80px; height: calc(100vh - 80px);
        }

        .nav-link { 
            text-decoration: none; color: var(--primary); font-size: 0.7rem; font-weight: 700; 
            display: block; margin-bottom: 20px; opacity: 0.5; cursor: pointer;
        }
        .nav-link.active { opacity: 1; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 12px; }

        /* --- CONTENT & CARDS --- */
        .content { padding: 40px; overflow-y: auto; }
        .blueprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--primary); }

        .b-card {
            background: var(--surface); padding: 40px; cursor: pointer; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            animation: cardEntrance 0.5s ease both;
        }
        .b-card::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 2px;
            background: #fff; opacity: 0; pointer-events: none;
        }
        .b-card:hover::after { animation: scanLineWhite 0.8s ease-in-out; opacity: 1; }
        .b-card:hover { background: var(--primary); color: #fff; border: 1px solid #fff; z-index: 5; transform: scale(1.02); }

        .domain-color { height: 4px; width: 100%; margin-bottom: 20px; }
        .c-sanitaire { background-color: #1e88e5; }
        .c-chauffage { background-color: #ff9800; }

        /* --- AI TERMINAL PANEL --- */
        .ai-panel {
            background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; position: sticky; top: 80px; height: calc(100vh - 80px);
        }
        .ai-header { 
            padding: 20px; background: var(--primary); color: #fff; font-family: 'JetBrains Mono'; 
            font-size: 0.7rem; display: flex; justify-content: space-between; align-items: center;
        }
        .ai-chat-results { flex-grow: 1; padding: 20px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 0.7rem; line-height: 1.6; }
        .ai-msg { margin-bottom: 20px; padding: 10px; border-left: 2px solid var(--border); }
        .ai-msg.bot { border-left-color: var(--accent); background: var(--grid-color); }
        .ai-msg.user { text-align: right; border-left: 0; border-right: 2px solid var(--primary); opacity: 0.7; }
        
        .ai-input-area { padding: 20px; border-top: 1px solid var(--border); }
        .ai-input { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            padding: 12px; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: inherit; outline: none;
        }

        .catalog-status { display: inline-block; padding: 3px 8px; font-size: 0.6rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        .catalog-status.obsolete { background: var(--offline-red); color: #fff; animation: blink 0.5s step-end infinite; }

        #statusBar { margin-top: auto; font-family: 'JetBrains Mono'; font-size: 0.6rem; padding-top: 20px; border-top: 1px solid var(--border); }
    </style>
</head>
<body data-theme="light">

<header>
    <a href="#" class="logo" onclick="renderDomaines()">RICHARDSON_<span>B.P.O.</span></a>
    <div style="flex-grow: 1; margin: 0 40px;">
        <input type="text" id="globalSearch" placeholder="SCAN_GLOBAL_INDEX..." style="width:100%; background:transparent; border:1px solid var(--border); padding:10px; font-family:'JetBrains Mono'; color:inherit;">
    </div>
    <div class="header-actions">
        <button class="action-btn" onclick="aiQuery('Génère un rapport de stock')">Rapport</button>
        <button class="action-btn" onclick="toggleTheme()" id="themeBtn">Dark_Mode</button>
    </div>
</header>

<div class="main-wrapper">
    <aside>
        <nav>
            <div id="nav-all" onclick="renderDomaines()" class="nav-link active">// INDEX_GLOBAL</div>
            <div id="nav-fav" class="nav-link">// FAVORIS</div>
            <div id="nav-fav" class="nav-link">// ARCHIVES</div>
        </nav>
        <div id="statusBar">
            <div style="opacity:0.5; margin-bottom:5px;">SECURE_TUNNEL: ACTIVE</div>
            <div style="color:var(--accent); font-weight:700;">NODE: <span id="liveTime">00:00:00</span></div>
        </div>
    </aside>

    <main class="content">
        <div id="viewTitle" style="margin-bottom: 25px; opacity: 0.4; font-family:'JetBrains Mono'; font-size:0.65rem; letter-spacing:2px;">ROOT / INDEX</div>
        <div id="app" class="blueprint-grid"></div>
    </main>

    <section class="ai-panel">
        <div class="ai-header">
            <span>CORE_AI v2.0</span>
            <span style="color: var(--online-green);">● ONLINE</span>
        </div>
        <div class="ai-chat-results" id="aiChat">
            <div class="ai-msg bot">> Système initialisé. Je peux scanner les catalogues PDF pour trouver un article précis ou une spécificité technique. Posez votre question ci-dessous.</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="aiInput" class="ai-input" placeholder="RECHERCHE_INTELLIGENTE..." onkeypress="if(event.key === 'Enter') handleAiChat()">
        </div>
    </section>
</div>

<script>
    const currentYear = new Date().getFullYear();
    const db = {
        "Sanitaire": { color: "c-sanitaire", brands: { "Grohe": ["2026", "2025"], "Hansgrohe": ["2026"], "Geberit": ["2024"] }},
        "Chauffage": { color: "c-chauffage", brands: { "Viessmann": ["2026"], "De Dietrich": ["2025"], "Atlantic": ["2026"] }}
    };

    const app = document.getElementById("app");
    const aiChat = document.getElementById("aiChat");

    // --- LOGIQUE CORE AI ---
    function handleAiChat() {
        const input = document.getElementById("aiInput");
        const val = input.value.trim();
        if(!val) return;

        // Message utilisateur
        aiChat.innerHTML += `<div class="ai-msg user">${val}</div>`;
        input.value = "";
        aiChat.scrollTop = aiChat.scrollHeight;

        // Simulation de réflexion
        setTimeout(() => {
            let response = "";
            const query = val.toLowerCase();
            
            if(query.includes("grohe")) {
                response = "Analyse terminée. Le catalogue Grohe 2026 contient 42 nouveaux articles en finition 'Phantom Black'. Souhaitez-vous le consulter ?";
            } else if(query.includes("obsolète")) {
                response = "Scan de sécurité : 1 catalogue trouvé (Geberit 2024). Recommandation : Mise à jour vers v2026.";
            } else {
                response = "Recherche multicritères lancée... Aucun article exact trouvé dans l'index immédiat. Voulez-vous que je scanne les archives PDF profondes ?";
            }
            
            aiChat.innerHTML += `<div class="ai-msg bot">> ANALYSE_PDF: ${response}</div>`;
            aiChat.scrollTop = aiChat.scrollHeight;
        }, 800);
    }

    function aiQuery(text) {
        document.getElementById("aiInput").value = text;
        handleAiChat();
    }

    // --- LOGIQUE AFFICHAGE ---
    function renderDomaines() {
        app.innerHTML = "";
        Object.keys(db).forEach((dom, i) => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${i * 0.1}s`;
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${dom}</h3>`;
            card.onclick = () => renderBrands(dom);
            app.appendChild(card);
        });
    }

    function renderBrands(dom) {
        app.innerHTML = `<div class="b-card" onclick="renderDomaines()" style="border: 1px solid var(--accent); color: var(--accent);"><h3>⬅ RETOUR</h3></div>`;
        Object.keys(db[dom].brands).forEach((brand, i) => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${(i+1) * 0.08}s`;
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${brand}</h3>`;
            card.onclick = () => renderFiles(dom, brand);
            app.appendChild(card);
        });
    }

    function renderFiles(dom, brand) {
        app.innerHTML = `<div class="b-card" onclick="renderBrands('${dom}')" style="border: 1px solid var(--accent); color: var(--accent);"><h3>⬅ RETOUR</h3></div>`;
        db[dom].brands[brand].forEach((year, i) => {
            const yearInt = parseInt(year);
            const status = yearInt < currentYear - 1 ? "OBSOLETE" : "VALIDE";
            const sClass = status === "OBSOLETE" ? "obsolete" : "valid";
            
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${(i+1) * 0.1}s`;
            card.innerHTML = `
                <div class="catalog-status ${sClass}">${status}</div>
                <h3>EDITION ${year}</h3>
                <button style="margin-top:20px; background:transparent; border:1px solid inherit; color:inherit; padding:10px; font-family:'JetBrains Mono'; font-size:0.6rem; cursor:pointer;">OUVRIR_PDF</button>
            `;
            app.appendChild(card);
        });
    }

    function toggleTheme() {
        const body = document.body;
        const target = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', target);
        document.getElementById('themeBtn').innerText = target === 'dark' ? "Light_Mode" : "Dark_Mode";
    }

    setInterval(() => {
        document.getElementById("liveTime").innerText = new Date().toTimeString().split(' ')[0];
    }, 1000);

    renderDomaines();
</script>
</body>
</html>
