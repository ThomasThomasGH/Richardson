<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Richardson | Archive Technique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rich-night: #001a33;
            --rich-red: #e30613;
            --concrete-bg: #f2f2f2; /* Fond gris béton clair */
            --line-gray: #d1d1d1;
            --pure-white: #ffffff;
            --success: #1a472a; /* Vert sombre architectural */
            --warning: #855d13; /* Orange terre d'ombre */
            --danger: #7a1a1a;  /* Rouge brique sombre */
        }

        * { box-sizing: border-box; border-radius: 0 !important; transition: all 0.2s ease-in-out; }
        
        body { 
            background-color: var(--concrete-bg); 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            color: var(--rich-night);
            letter-spacing: -0.02em;
        }

        /* Header Linéaire */
        header {
            background: var(--pure-white);
            padding: 2rem 5%;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 2px solid var(--rich-night);
        }

        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--rich-night);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .logo span { color: var(--rich-red); }

        .header-meta {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        h2 { 
            font-weight: 300; 
            font-size: 2.5rem;
            margin-bottom: 3rem; 
            text-transform: uppercase;
            border-bottom: 1px solid var(--line-gray);
            padding-bottom: 1rem;
        }

        /* Grille Structurelle */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1px; /* Créer un effet de grille par les bordures */
            background-color: var(--line-gray);
            border: 1px solid var(--line-gray);
        }

        /* Cellules de la Grille */
        .card {
            background: var(--pure-white);
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            background: var(--rich-night);
            color: var(--pure-white);
        }

        .card-title {
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        /* Catalogues (Niveau Final) */
        .catalog-card {
            text-align: left;
            padding: 2.5rem;
            border-top: 8px solid;
        }

        .status-green { border-top-color: var(--success); }
        .status-orange { border-top-color: var(--warning); }
        .status-red { border-top-color: var(--danger); }

        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 8px;
            border: 1px solid currentColor;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .warning-msg {
            margin-top: 2rem;
            font-size: 0.7rem;
            padding: 1rem;
            background: #fdf2f2;
            border: 1px solid var(--danger);
            color: var(--danger);
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Boutons Techniques */
        .btn-back {
            background: var(--rich-night);
            color: white;
            border: none;
            padding: 1rem 2rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .btn-back:hover {
            background: var(--rich-red);
        }

        .btn-action {
            display: inline-block;
            width: 100%;
            text-align: center;
            border: 1px solid var(--rich-night);
            color: var(--rich-night);
            padding: 1rem;
            text-decoration: none;
            font-weight: 700;
            margin-top: 2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .card:hover .btn-action {
            border-color: var(--pure-white);
            color: var(--pure-white);
        }

        .btn-action:hover {
            background: var(--pure-white);
            color: var(--rich-night) !important;
        }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="location.reload()">RICHARD<span>SON</span></a>
    <div class="header-meta">
        Index Technique // Édition 2026.03
    </div>
</header>

<div class="container" id="app">
    </div>

<script>
    const currentYear = 2026;
    
    const catalogues = {
        "Sanitaire": {
            "Grohe": ["2026", "2025"],
            "Hansgrohe": ["2026"],
            "Geberit": ["2024"]
        },
        "Chauffage": {
            "Viessmann": ["2026"],
            "De Dietrich": ["2025"],
            "Saunier Duval": ["2026"]
        },
        "Plomberie": {
            "Nicoll": ["2025"],
            "Viega": ["2026"]
        }
    };

    let state = { domaine: null, marque: null };

    function getStatus(year) {
        const y = parseInt(year);
        const m = new Date().getMonth(); 

        if (y < currentYear) return { class: 'status-red', label: 'INVALID_EXP', warning: true };
        if (m >= 6) return { class: 'status-orange', label: 'CHECK_REQ', warning: false };
        return { class: 'status-green', label: 'VALID_CONFIRMED', warning: false };
    }

    const app = document.getElementById("app");

    function renderDomaines() {
        app.innerHTML = `<h2>Univers Métiers</h2>`;
        const grid = document.createElement("div");
        grid.className = "grid";

        Object.keys(catalogues).forEach(dom => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<span class="card-title">${dom}</span>`;
            card.onclick = () => { state.domaine = dom; renderMarques(); };
            grid.appendChild(card);
        });
        app.appendChild(grid);
    }

    function renderMarques() {
        app.innerHTML = `<button class="btn-back" onclick="renderDomaines()">RETOUR</button><h2>${state.domaine}</h2>`;
        const grid = document.createElement("div");
        grid.className = "grid";

        Object.keys(catalogues[state.domaine]).forEach(m => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<span class="card-title">${m}</span>`;
            card.onclick = () => { state.marque = m; renderAnnees(); };
            grid.appendChild(card);
        });
        app.appendChild(grid);
    }

    function renderAnnees() {
        app.innerHTML = `<button class="btn-back" onclick="renderMarques()">RETOUR</button><h2>${state.marque}</h2>`;
        const grid = document.createElement("div");
        grid.className = "grid";

        catalogues[state.domaine][state.marque].forEach(yr => {
            const status = getStatus(yr);
            const card = document.createElement("div");
            card.className = `card catalog-card ${status.class}`;
            
            card.innerHTML = `
                <span class="badge">${status.label}</span>
                <div style="font-weight:700; font-size:1.8rem;">ED.${yr}</div>
                <p style="text-transform: uppercase; font-size:0.65rem; margin-top:1rem; opacity:0.7;">Documentation Technique PDF</p>
                ${status.warning ? `<div class="warning-msg">Attention: Documentation hors cycle. Vérification fournisseur impérative.</div>` : ''}
                <a href="#" class="btn-action" onclick="alert('Accès au document ${state.marque} ${yr}')">Consulter l'archive</a>
            `;
            grid.appendChild(card);
        });
        app.appendChild(grid);
    }

    renderDomaines();
</script>

</body>
</html>
