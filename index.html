<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDSON | B.P.O. v6.5 STABLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f4; --surface: #ffffff; --primary: #001a33; --accent: #e30613;
            --text: #001a33; --border: #d1d1d1; --grid-color: rgba(0, 26, 51, 0.05);
            --online-green: #00ff88; --offline-red: #ff4444;
            --card-hover: #001a33; --card-hover-text: #ffffff;
            --glow-power: 0px; --ai-panel-w: 380px;
        }

        [data-theme="dark"] {
            --bg: #050505; --surface: #0a0a0a; --primary: #ffffff;
            --text: #e0e0e0; --border: #1a1a1a; --grid-color: rgba(255, 255, 255, 0.02);
            --glow-power: 15px; 
            --card-hover: #111111;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s, transform 0.2s; border-radius: 0 !important; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; font-family: 'Inter', sans-serif; margin: 0; color: var(--text); height: 100vh;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- ANIMATIONS --- */
        @keyframes scanLine { 0% { top: -10%; opacity: 0; } 40% { opacity: 1; } 100% { top: 110%; opacity: 0; } }
        @keyframes pulseNeon { 0%, 100% { filter: brightness(1); opacity: 1; } 50% { filter: brightness(1.5); opacity: 0.7; } }

        /* --- HEADER --- */
        header {
            height: 80px; background: var(--surface); border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; padding: 0 40px; z-index: 1000; flex-shrink: 0;
        }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 4px; text-decoration: none; color: var(--primary); cursor: pointer; }
        .logo span { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; margin-left: auto; }
        .action-btn {
            background: var(--primary); color: var(--surface); border: none; padding: 10px 18px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }
        .action-btn:hover { background: var(--accent); }

        /* --- LAYOUT --- */
        .main-wrapper { display: grid; grid-template-columns: 300px 1fr var(--ai-panel-w); flex-grow: 1; overflow: hidden; }

        /* --- ASIDE GAUCHE --- */
        aside {
            border-right: 1px solid var(--border); background: var(--surface); padding: 40px;
            display: flex; flex-direction: column; z-index: 10;
        }
        .nav-link { 
            text-decoration: none; color: var(--primary); font-size: 0.75rem; font-weight: 700; 
            display: block; margin-bottom: 25px; opacity: 0.5; cursor: pointer; text-transform: uppercase;
        }
        .nav-link.active { opacity: 1; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }

        #statusBar { margin-top: auto; padding-top: 30px; border-top: 2px solid var(--primary); font-family: 'JetBrains Mono', monospace; }
        .status-item { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; text-transform: uppercase; font-size: 0.6rem; }
        .status-value { font-weight: 700; display: flex; align-items: center; gap: 10px; font-size: 0.7rem; }
        
        .dot { 
            width: 10px; height: 10px; background: var(--online-green); 
            box-shadow: 0 0 var(--glow-power) var(--online-green); 
            animation: pulseNeon 2s infinite; border-radius: 50% !important;
        }

        /* --- CENTRE --- */
        .content { padding: 40px; overflow-y: auto; }
        .view-header { margin-bottom: 30px; opacity: 0.4; font-family: 'JetBrains Mono'; font-size: 0.7rem; letter-spacing: 3px; }
        .blueprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--primary); }

        .b-card {
            background: var(--surface); padding: 50px 40px; cursor: pointer; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .b-card::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 3px;
            background: #ffffff; opacity: 0; z-index: 10; box-shadow: 0 0 15px #ffffff;
        }
        .b-card:hover::after { animation: scanLine 0.8s ease-in-out; }
        .b-card:hover { 
            background: var(--card-hover); color: var(--card-hover-text); 
            transform: scale(1.02); z-index: 10; border: 1px solid #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .domain-color { height: 6px; width: 100%; margin-bottom: 25px; }
        .c-sanitaire { background-color: #1e88e5; }
        .c-chauffage { background-color: #ff9800; }
        .c-plomberie { background-color: #4caf50; }

        .catalog-status { 
            display: inline-block; padding: 4px 10px; font-size: 0.65rem; font-weight: 800; 
            margin-bottom: 20px; text-transform: uppercase;
        }
        .valid { background: var(--online-green); color: #000; box-shadow: 0 0 var(--glow-power) var(--online-green); }
        .obsolete { background: var(--offline-red); color: #fff; box-shadow: 0 0 var(--glow-power) var(--offline-red); }

        /* --- AI PANEL --- */
        .ai-panel { border-left: 2px solid var(--primary); background: var(--surface); display: flex; flex-direction: column; height: 100%; }
        .ai-header { padding: 20px; background: var(--primary); color: var(--surface); font-family: 'JetBrains Mono'; font-size: 0.7rem; font-weight: 800; }
        .ai-chat-results { 
            flex-grow: 1; padding: 20px; overflow-y: auto; font-family: 'JetBrains Mono'; 
            font-size: 0.75rem; background: var(--bg); color: var(--text);
        }
        .ai-msg { margin-bottom: 15px; padding: 12px; border-left: 3px solid var(--accent); background: var(--surface); }
        .ai-msg.user { border-left: 0; border-right: 3px solid var(--primary); text-align: right; opacity: 0.7; }
        .ai-input-area { padding: 20px; border-top: 1px solid var(--border); background: var(--surface); }
        .ai-input { 
            width: 100%; background: var(--bg); border: 2px solid var(--primary); 
            padding: 12px; font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--text); outline: none;
        }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo" onclick="renderDomaines()">RICHARDSON_<span>B.P.O.</span></div>
    <div style="flex-grow: 1; margin: 0 40px;">
        <input type="text" id="globalSearch" placeholder="RECHERCHE_INDEX..." style="width:100%; background:transparent; border:1px solid var(--border); padding:10px; font-family:'JetBrains Mono'; color:inherit; outline:none;">
    </div>
    <div class="header-actions">
        <button class="action-btn" onclick="aiBot('Générer rapport')">Rapport</button>
        <button class="action-btn" id="themeBtn" onclick="toggleTheme()">Dark_Mode</button>
    </div>
</header>

<div class="main-wrapper">
    <aside>
        <div style="font-size: 0.6rem; font-weight: 800; margin-bottom: 30px; opacity: 0.4; letter-spacing: 2px;">SYSTEM_NAV</div>
        <nav>
            <div onclick="renderDomaines()" class="nav-link active">// INDEX_GLOBAL</div>
            <div class="nav-link">// FAVORIS</div>
        </nav>

        <div id="statusBar">
            <div class="status-item"><span style="opacity:0.4">Node_Agence</span><span class="status-value" style="color: var(--accent);">MOUGINS_06</span></div>
            <div class="status-item"><span style="opacity:0.4">Status</span><span class="status-value"><div class="dot"></div>SYSTEM_READY</span></div>
            <div class="status-item"><span style="opacity:0.4">Uptime</span><span class="status-value" id="liveTime">00:00:00</span></div>
        </div>
    </aside>

    <main class="content">
        <div class="view-header" id="viewTitle">SYSTEM / ROOT / INDEX</div>
        <div id="app" class="blueprint-grid"></div>
    </main>

    <section class="ai-panel">
        <div class="ai-header">CORE_AI_TERMINAL</div>
        <div class="ai-chat-results" id="aiChat">
            <div class="ai-msg bot">> ANALYSEUR_PRÊT. Entrez une marque ou une division.</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="aiInput" class="ai-input" placeholder="DEMANDER À L'IA..." onkeypress="if(event.key === 'Enter') handleAiChat()">
        </div>
    </section>
</div>

<script>
    const currentYear = new Date().getFullYear();
    const db = {
        "Sanitaire": { color: "c-sanitaire", brands: { "Grohe": ["2026", "2025"], "Hansgrohe": ["2026"], "Geberit": ["2024"] }},
        "Chauffage": { color: "c-chauffage", brands: { "Viessmann": ["2026"], "De Dietrich": ["2025"], "Atlantic": ["2026"] }},
        "Plomberie": { color: "c-plomberie", brands: { "Nicoll": ["2025"], "Viega": ["2026"], "Watts": ["2024"] }}
    };

    const app = document.getElementById("app");
    const aiChat = document.getElementById("aiChat");
    const viewTitle = document.getElementById("viewTitle");

    // NAVIGATION & RENDU
    function renderDomaines() {
        viewTitle.innerText = "SYSTEM / ROOT / INDEX";
        app.innerHTML = "";
        Object.keys(db).forEach(dom => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${dom}</h3><div style="margin-top:auto; font-size:0.6rem; opacity:0.4;">SÉLECTION_DIVISION</div>`;
            card.onclick = () => renderBrands(dom);
            app.appendChild(card);
        });
    }

    function renderBrands(dom) {
        viewTitle.innerText = `SYSTEM / ROOT / ${dom.toUpperCase()}`;
        app.innerHTML = `<div class="b-card" onclick="renderDomaines()" style="border: 2px solid var(--accent); color: var(--accent);"><h3>⬅ RETOUR</h3></div>`;
        Object.keys(db[dom].brands).forEach(brand => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${brand}</h3>`;
            card.onclick = () => renderFiles(dom, brand);
            app.appendChild(card);
        });
    }

    function renderFiles(dom, brand) {
        viewTitle.innerText = `SYSTEM / ROOT / ${dom.toUpperCase()} / ${brand.toUpperCase()}`;
        app.innerHTML = `<div class="b-card" onclick="renderBrands('${dom}')" style="border: 2px solid var(--accent); color: var(--accent);"><h3>⬅ RETOUR</h3></div>`;
        db[dom].brands[brand].forEach(year => {
            const isObsolete = parseInt(year) < currentYear - 1;
            const statusText = isObsolete ? "OBSOLETE" : "VALIDE_2026";
            const sClass = isObsolete ? "obsolete" : "valid";
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `<div class="catalog-status ${sClass}">${statusText}</div><h3>EDITION ${year}</h3><button style="margin-top:20px; background:transparent; border:1px solid inherit; padding:12px; color:inherit; font-weight:700; cursor:pointer;">OUVRIR_PDF</button>`;
            app.appendChild(card);
        });
    }

    // IA LOGIC
    function handleAiChat() {
        const input = document.getElementById("aiInput");
        const val = input.value.trim();
        if(!val) return;
        aiChat.innerHTML += `<div class="ai-msg user">${val}</div>`;
        input.value = "";
        aiChat.scrollTop = aiChat.scrollHeight;
        setTimeout(() => {
            let res = "Analyse terminée. Résultat disponible dans l'index.";
            if(val.toLowerCase().includes("plomberie")) res = "Division PLOMBERIE: Nicoll et Viega chargés.";
            aiChat.innerHTML += `<div class="ai-msg bot">> AI: ${res}</div>`;
            aiChat.scrollTop = aiChat.scrollHeight;
        }, 600);
    }

    function aiBot(cmd) { document.getElementById("aiInput").value = cmd; handleAiChat(); }

    // THEME SWITCHER
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeBtn");
        if (body.getAttribute("data-theme") === "dark") {
            body.setAttribute("data-theme", "light");
            btn.innerText = "Dark_Mode";
        } else {
            body.setAttribute("data-theme", "dark");
            btn.innerText = "Light_Mode";
        }
    }

    // INITIALISATION
    setInterval(() => { document.getElementById("liveTime").innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
    renderDomaines();
</script>
</body>
</html>
