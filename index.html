<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDSON | B.P.O. v5.1 FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f4; --surface: #ffffff; --primary: #001a33; --accent: #e30613;
            --text: #001a33; --border: #d1d1d1; --grid-color: rgba(0, 26, 51, 0.05);
            --online-green: #00ff88; --offline-red: #ff4444;
            --card-hover: #001a33; --card-hover-text: #ffffff;
            --laser-white: #ffffff; --glow-power: 0px;
        }

        [data-theme="dark"] {
            --bg: #050505; --surface: #0a0a0a; --primary: #ffffff;
            --text: #e0e0e0; --border: #1a1a1a; --grid-color: rgba(255, 255, 255, 0.02);
            --card-hover: #111111; --card-hover-text: #ffffff;
            --glow-power: 12px; /* Activation du glow en mode Dark */
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 !important; }
        
        body {
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; font-family: 'Inter', sans-serif; margin: 0; color: var(--text); min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- ANIMATIONS SYSTÉMIQUES --- */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes scanLineWhite {
            0% { top: -10%; opacity: 0; }
            40% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        @keyframes glitchRed {
            0% { transform: translate(0); filter: brightness(1); }
            20% { transform: translate(-2px, 1px); filter: brightness(1.3); }
            40% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        /* --- UI COMPONENTS --- */
        header {
            height: 80px; background: var(--surface); border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; padding: 0 40px; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 4px; text-decoration: none; color: var(--primary); }
        .logo span { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; margin-left: auto; }
        .action-btn {
            background: var(--primary); color: var(--surface); border: none; padding: 10px 18px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }
        .action-btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* --- LAYOUT --- */
        .main-wrapper { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 80px); }

        aside {
            border-right: 1px solid var(--border); background: var(--surface); padding: 40px;
            display: flex; flex-direction: column; position: sticky; top: 80px; height: calc(100vh - 80px);
        }

        .nav-link { 
            text-decoration: none; color: var(--primary); font-size: 0.75rem; font-weight: 700; 
            display: block; margin-bottom: 25px; opacity: 0.5; cursor: pointer; text-transform: uppercase;
        }
        .nav-link.active { opacity: 1; color: var(--accent); border-left: 3px solid var(--accent); padding-left: 10px; }

        /* --- STATUS PANEL --- */
        #statusBar { margin-top: auto; padding-top: 30px; border-top: 2px solid var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; }
        .status-item { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; text-transform: uppercase; }
        .status-value { font-weight: 700; display: flex; align-items: center; gap: 6px; font-size: 0.7rem; }
        .dot { width: 8px; height: 8px; border: 1px solid var(--primary); }
        .dot.online { background: var(--online-green); box-shadow: 0 0 var(--glow-power) var(--online-green); animation: pulse 2s infinite; }

        /* --- GRID & CARDS --- */
        .content { padding: 60px; }
        .blueprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--primary); }

        .b-card {
            background: var(--surface); padding: 50px 40px; cursor: pointer; 
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            animation: cardEntrance 0.6s cubic-bezier(0.2, 1, 0.3, 1) both;
        }

        /* Laser Blanc */
        .b-card::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 3px;
            background: #ffffff; opacity: 0; pointer-events: none; z-index: 10;
            box-shadow: 0 0 15px #ffffff;
        }
        .b-card:hover::after { animation: scanLineWhite 0.8s ease-in-out; }

        /* Contour Blanc & Fond Sombre au survol */
        .b-card:hover { 
            background: var(--card-hover); color: var(--card-hover-text); 
            transform: scale(1.02); z-index: 10; border: 1px solid #ffffff;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .b-card h3 { font-size: 2rem; margin: 0; font-weight: 300; text-transform: uppercase; letter-spacing: -1px; }

        .catalog-status { display: inline-block; padding: 4px 10px; font-size: 0.65rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .catalog-status.valid { background: var(--online-green); color: #000; box-shadow: 0 0 var(--glow-power) var(--online-green); }
        .catalog-status.recent { background: #ffc107; color: #000; box-shadow: 0 0 var(--glow-power) #ffc107; }
        .catalog-status.obsolete { background: var(--offline-red); color: #fff; animation: glitchRed 0.2s infinite; box-shadow: 0 0 var(--glow-power) var(--offline-red); }

        .domain-color { height: 6px; width: 100%; margin-bottom: 25px; }
        .c-sanitaire { background-color: #1e88e5; }
        .c-chauffage { background-color: #ff9800; }
        .c-plomberie { background-color: #4caf50; }

        .btn-action {
            border: 1px solid var(--primary); background: transparent; color: inherit; padding: 15px;
            font-weight: 700; text-transform: uppercase; font-size: 0.65rem; cursor: pointer; margin-top: 20px;
        }
        .b-card:hover .btn-action { border-color: #ffffff; }

        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: var(--surface);
            padding: 20px 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            transform: translateY(150%); transition: 0.5s; z-index: 3000; border: 1px solid var(--accent);
        }
        #toast.show { transform: translateY(0); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body data-theme="light">

<header>
    <a href="#" class="logo" onclick="renderDomaines()">RICHARDSON_<span>B.P.O.</span></a>
    <div style="flex-grow: 1; margin: 0 60px;">
        <input type="text" id="globalSearch" placeholder="SYSTEM_SCANNER_INDEX..." style="width:100%; background:transparent; border:1px solid var(--border); padding:12px; font-family:'JetBrains Mono'; color:inherit; outline:none;">
    </div>
    <div class="header-actions">
        <button class="action-btn" onclick="showToast('Rapport généré')">[ ↓ ] Rapport</button>
        <button class="action-btn" onclick="showToast('Aide système activée')">[ ? ] Aide</button>
        <button class="action-btn" onclick="toggleTheme()" id="themeBtn">Dark_Mode</button>
    </div>
</header>

<div class="main-wrapper">
    <aside>
        <div style="font-size: 0.6rem; font-weight: 800; margin-bottom: 30px; opacity: 0.4; letter-spacing: 2px;">SYSTEM_NAV</div>
        <nav>
            <div id="nav-all" onclick="renderDomaines()" class="nav-link active">// INDEX_GLOBAL</div>
            <div id="nav-fav" onclick="renderPinned()" class="nav-link">// FAVORIS_SYSTEME</div>
        </nav>

        <div id="statusBar">
            <div class="status-item"><span style="opacity:0.4">Node_Agence</span><span class="status-value" style="color: var(--accent);">MOUGINS_06_FR</span></div>
            <div class="status-item"><span style="opacity:0.4">Status</span><span class="status-value"><div class="dot online"></div>SYSTEM_READY</span></div>
            <div class="status-item"><span style="opacity:0.4">Uptime</span><span class="status-value" id="liveTime">00:00:00</span></div>
        </div>
    </aside>

    <main class="content">
        <div id="viewTitle" style="margin-bottom: 30px; opacity: 0.4; font-family:'JetBrains Mono'; font-size:0.7rem; letter-spacing:3px;">SYSTEM / ROOT / INDEX</div>
        <div id="app" class="blueprint-grid"></div>
    </main>
</div>

<div id="toast">ACTION_SUCCESS</div>

<script>
    const currentYear = new Date().getFullYear();
    const db = {
        "Sanitaire": { color: "c-sanitaire", brands: { "Grohe": ["2026", "2025"], "Hansgrohe": ["2026"], "Geberit": ["2024"] }},
        "Chauffage": { color: "c-chauffage", brands: { "Viessmann": ["2026"], "De Dietrich": ["2025"], "Atlantic": ["2026"] }},
        "Plomberie": { color: "c-plomberie", brands: { "Nicoll": ["2025"], "Viega": ["2026"] }}
    };

    const app = document.getElementById("app");
    const viewTitle = document.getElementById("viewTitle");

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = "> " + msg.toUpperCase();
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    function renderDomaines() {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('nav-all').classList.add('active');
        viewTitle.innerText = "SYSTEM / ROOT / INDEX";
        app.innerHTML = "";
        Object.keys(db).forEach((dom, i) => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${i * 0.1}s`;
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${dom}</h3><div style="margin-top:auto; font-size:0.6rem; opacity:0.4;">ENTRÉE_INDEX_${i+1}</div>`;
            card.onclick = () => renderBrands(dom);
            app.appendChild(card);
        });
    }

    function renderBrands(dom) {
        viewTitle.innerText = `SYSTEM / ROOT / ${dom.toUpperCase()}`;
        app.innerHTML = `<div class="b-card" onclick="renderDomaines()" style="border-color:var(--accent); color:var(--accent); animation-delay:0s;"><h3>⬅ RETOUR</h3></div>`;
        Object.keys(db[dom].brands).forEach((brand, i) => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${(i+1) * 0.08}s`;
            card.innerHTML = `<div class="domain-color ${db[dom].color}"></div><h3>${brand}</h3>`;
            card.onclick = () => renderFiles(dom, brand);
            app.appendChild(card);
        });
    }

    function renderFiles(dom, brand) {
        viewTitle.innerText = `SYSTEM / ROOT / ${dom.toUpperCase()} / ${brand.toUpperCase()}`;
        app.innerHTML = `<div class="b-card" onclick="renderBrands('${dom}')" style="border-color:var(--accent); color:var(--accent); animation-delay:0s;"><h3>⬅ RETOUR</h3></div>`;
        db[dom].brands[brand].forEach((year, i) => {
            const yearInt = parseInt(year);
            let status = "OBSOLETE", sClass = "obsolete";
            if (yearInt === currentYear) { status = "VALIDE_2026"; sClass = "recent"; }
            else if (yearInt === currentYear - 1) { status = "CERTIFIÉ_2025"; sClass = "valid"; }
            
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.animationDelay = `${(i+1) * 0.1}s`;
            card.innerHTML = `
                <div class="catalog-status ${sClass}">${status}</div>
                <h3>EDITION ${year}</h3>
                <button class="btn-action">ACCÉDER_AU_FICHIER</button>
            `;
            app.appendChild(card);
        });
    }

    function toggleTheme() {
        const body = document.body;
        const target = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', target);
        document.getElementById('themeBtn').innerText = target === 'dark' ? "Light_Mode" : "Dark_Mode";
    }

    function renderPinned() { showToast("Accès Favoris..."); }

    setInterval(() => {
        document.getElementById("liveTime").innerText = new Date().toTimeString().split(' ')[0];
    }, 1000);

    renderDomaines();
</script>
</body>
</html>
