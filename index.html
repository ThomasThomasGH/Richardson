<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDSON | B.P.O. ULTIMATE v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --primary: #001a33; --accent: #e30613;
            --text: #001a33; --border: #e0e0e0; --grid-color: rgba(0, 26, 51, 0.03);
            --online-green: #00ff88; --offline-red: #ff4444; --warning-orange: #ff9800;
        }

        [data-theme="dark"] {
            --bg: #050505; --surface: #0f0f0f; --primary: #ffffff;
            --text: #f0f0f0; --border: #1f1f1f; --grid-color: rgba(255, 255, 255, 0.02);
        }

        * { box-sizing: border-box; transition: all 0.25s ease; border-radius: 0 !important; }
        
        body { 
            background-color: var(--bg);
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px; font-family: 'Inter', sans-serif; margin: 0; color: var(--text); min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            height: 70px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; text-decoration: none; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .logo::before { content: ''; width: 12px; height: 12px; background: var(--accent); }

        .search-container { flex-grow: 1; margin: 0 50px; position: relative; }
        #globalSearch { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 10px 45px; 
            font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 0.75rem; outline: none;
        }
        #globalSearch:focus { border-color: var(--accent); background: var(--surface); }

        .header-actions { display: flex; gap: 12px; }
        .action-btn { 
            background: transparent; color: var(--primary); border: 1px solid var(--border); padding: 8px 16px; 
            font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }
        .action-btn:hover { background: var(--primary); color: var(--surface); }

        /* --- LAYOUT --- */
        .main-wrapper { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 70px); }

        aside { 
            border-right: 1px solid var(--border); background: var(--surface); padding: 30px;
            display: flex; flex-direction: column; position: sticky; top: 70px; height: calc(100vh - 70px);
        }

        .nav-link { 
            text-decoration: none; color: var(--primary); font-size: 0.7rem; font-weight: 700; 
            padding: 12px; margin-bottom: 10px; opacity: 0.4; cursor: pointer; border-left: 2px solid transparent;
        }
        .nav-link:hover { opacity: 0.8; background: var(--grid-color); }
        .nav-link.active { opacity: 1; border-left: 2px solid var(--accent); background: var(--grid-color); }

        /* --- CONTENT --- */
        .content { padding: 40px; }
        .breadcrumb { font-family: 'JetBrains Mono'; font-size: 0.65rem; margin-bottom: 25px; display: flex; gap: 10px; opacity: 0.5; }
        
        .blueprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .b-card { 
            background: var(--surface); padding: 30px; cursor: pointer; display: flex; 
            flex-direction: column; border: 1px solid var(--border); position: relative;
        }
        .b-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-color: var(--accent); }
        
        .b-card h3 { font-size: 1.4rem; margin: 15px 0 5px 0; font-weight: 700; text-transform: uppercase; }

        /* --- TAGS & STATUS --- */
        .tag-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .status-pill { font-family: 'JetBrains Mono'; font-size: 0.55rem; padding: 2px 8px; font-weight: 700; text-transform: uppercase; }
        .valid { background: var(--online-green); color: #000; }
        .obsolete { background: var(--offline-red); color: #fff; }
        .recent { background: var(--warning-orange); color: #fff; }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-box { 
            background: var(--surface); width: 100%; max-width: 800px; height: 80vh; 
            border: 1px solid var(--accent); display: flex; flex-direction: column;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        #statusBar { margin-top: auto; padding-top: 20px; font-family: 'JetBrains Mono'; border-top: 1px solid var(--border); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .b-card { animation: fadeIn 0.4s ease forwards; }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="renderDomaines()">RICHARDSON_B.P.O.</a>
    <div class="search-container">
        <input type="text" id="globalSearch" placeholder="CMD_RECHERCHE : TAPEZ MARQUE, ANNEE OU UNIVERS...">
    </div>
    <div class="header-actions">
        <button class="action-btn" onclick="exportInventory()">Rapport</button>
        <button class="action-btn" onclick="toggleTheme()">Dark_Mode</button>
        <button class="action-btn" onclick="toggleHelp()">?</button>
    </div>
</header>

<div class="main-wrapper">
    <aside>
        <nav>
            <div id="nav-all" onclick="renderDomaines()" class="nav-link active">// INDEX_GENERAL</div>
            <div id="nav-fav" onclick="renderPinned()" class="nav-link">// FAVORIS_ÉPINGLÉS</div>
        </nav>

        <div id="statusBar">
            <div style="font-size: 0.55rem; opacity: 0.5; margin-bottom: 15px;">TERMINAL_STATUS</div>
            <div style="font-size: 0.65rem; margin-bottom: 10px;">AGENCE : <span style="color:var(--accent)">MOUGINS_06</span></div>
            <div style="font-size: 0.65rem;" id="liveDate">--/--/--</div>
            <div style="font-size: 0.8rem; font-weight: 700;" id="liveTime">00:00:00</div>
        </div>
    </aside>
    
    <main class="content">
        <div class="breadcrumb" id="breadcrumb">ROOT / INDEX</div>
        <div id="app" class="blueprint-grid"></div>
    </main>
</div>

<div id="viewerModal" class="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div id="modalTitle" style="font-family: 'JetBrains Mono'; font-weight: 700;">DOCUMENT_VIEWER</div>
            <button class="action-btn" onclick="closeModal()">FERMER [ESC]</button>
        </div>
        <div id="modalContent" style="flex-grow: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; font-size: 0.8rem;">
            <div style="text-align: center;">
                <p>[ CHARGEMENT DU FLUX PDF EN COURS... ]</p>
                <p style="opacity: 0.5;">AGENCE_MOUGINS_AUTHORIZED</p>
            </div>
        </div>
    </div>
</div>

<div id="toast" style="position:fixed; bottom: 20px; right: 20px; background:var(--primary); color:white; padding:10px 20px; font-family:'JetBrains Mono'; font-size:0.6rem; display:none; border: 1px solid var(--accent);">TEST</div>

<script>
    const currentYear = new Date().getFullYear();
    const db = {
        "Sanitaire": { "Grohe": ["2026", "2025"], "Hansgrohe": ["2026"], "Geberit": ["2024"], "Villeroy & Boch": ["2026"], "Ideal Standard": ["2025"] },
        "Chauffage": { "Viessmann": ["2026"], "De Dietrich": ["2025"], "Saunier Duval": ["2026"], "Atlantic": ["2026"], "Ariston": ["2024"] },
        "Plomberie": { "Nicoll": ["2025"], "Viega": ["2026"], "Watts": ["2024"], "Grundfos": ["2026"] }
    };

    let pinnedBrands = JSON.parse(localStorage.getItem('richardson_pinned')) || [];
    const app = document.getElementById("app");
    const breadcrumb = document.getElementById("breadcrumb");

    function renderDomaines() {
        setActiveLink('nav-all');
        breadcrumb.innerText = "ROOT / SELECTION_UNIVERS";
        app.innerHTML = "";
        Object.keys(db).forEach((dom, i) => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `
                <div style="height: 3px; width: 30px; background: var(--accent); margin-bottom: 15px;"></div>
                <div style="font-family:'JetBrains Mono'; font-size:0.55rem; opacity:0.4;">SECTEUR_00${i+1}</div>
                <h3>${dom}</h3>
                <div style="font-family:'JetBrains Mono'; font-size:0.55rem; margin-top: auto; opacity: 0.5;">${Object.keys(db[dom]).length} MARQUES DISPONIBLES</div>
            `;
            card.onclick = () => renderBrands(dom);
            app.appendChild(card);
        });
    }

    function renderBrands(dom) {
        breadcrumb.innerText = `ROOT / ${dom.toUpperCase()}`;
        app.innerHTML = "";
        
        // Bouton Retour Spécial
        const back = document.createElement("div");
        back.className = "b-card";
        back.style.borderColor = "var(--accent)";
        back.innerHTML = `<h3>⬅ RETOUR</h3>`;
        back.onclick = renderDomaines;
        app.appendChild(back);

        Object.keys(db[dom]).forEach(brand => {
            const isPinned = pinnedBrands.includes(brand);
            const card = document.createElement("div");
            card.className = `b-card ${isPinned ? 'is-pinned' : ''}`;
            card.innerHTML = `
                <div class="tag-row">
                    ${isPinned ? '<span class="status-pill valid" style="background:var(--accent); color:white">ÉPINGLÉ</span>' : ''}
                    <span class="status-pill" style="border:1px solid var(--border)">ID_${brand.slice(0,3).toUpperCase()}</span>
                </div>
                <h3>${brand}</h3>
                <div style="margin-top:auto; font-family:'JetBrains Mono'; font-size:0.55rem; opacity:0.5;">CLIC-DROIT POUR ÉPINGLER</div>
            `;
            card.onclick = () => renderFiles(dom, brand);
            card.oncontextmenu = (e) => { e.preventDefault(); togglePin(brand); };
            app.appendChild(card);
        });
    }

    function renderFiles(dom, brand) {
        breadcrumb.innerText = `ROOT / ${dom.toUpperCase()} / ${brand.toUpperCase()}`;
        app.innerHTML = "";
        
        const back = document.createElement("div");
        back.className = "b-card";
        back.style.borderColor = "var(--accent)";
        back.innerHTML = `<h3>⬅ RETOUR</h3>`;
        back.onclick = () => renderBrands(dom);
        app.appendChild(back);

        db[dom][brand].forEach(year => {
            const yearInt = parseInt(year);
            let status = "OBSOLETE", sClass = "obsolete";
            if (yearInt === currentYear) { status = "DERNIÈRE ÉDITION"; sClass = "recent"; }
            else if (yearInt === currentYear - 1) { status = "VALIDE"; sClass = "valid"; }

            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `
                <div class="status-pill ${sClass}" style="width: fit-content; margin-bottom: 10px;">${status}</div>
                <div style="font-family:'JetBrains Mono'; font-size:0.6rem; opacity:0.5;">DOC_REF: ${brand.toUpperCase()}_${year}</div>
                <h3>EDITION ${year}</h3>
                <button class="action-btn" style="margin-top: 20px; width: 100%;" onclick="openModal('${brand} ${year}')">CONSULTER_ARCHIVE</button>
            `;
            app.appendChild(card);
        });
    }

    function renderPinned() {
        setActiveLink('nav-fav');
        breadcrumb.innerText = "ROOT / FAVORIS_EPINGLES";
        app.innerHTML = "";
        
        if (pinnedBrands.length === 0) {
            app.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px; font-family: 'JetBrains Mono'; opacity: 0.3;">[ AUCUN DOCUMENT DANS VOTRE SELECTION ]</div>`;
            return;
        }

        pinnedBrands.forEach(brand => {
            let foundDom = "";
            Object.keys(db).forEach(d => { if(db[d][brand]) foundDom = d; });
            
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `
                <div class="status-pill recent" style="width: fit-content;">FAVORI</div>
                <h3>${brand}</h3>
                <div style="font-family:'JetBrains Mono'; font-size:0.55rem; opacity:0.5;">${foundDom.toUpperCase()}</div>
            `;
            card.onclick = () => renderFiles(foundDom, brand);
            card.oncontextmenu = (e) => { e.preventDefault(); togglePin(brand); };
            app.appendChild(card);
        });
    }

    function togglePin(brand) {
        if(pinnedBrands.includes(brand)) {
            pinnedBrands = pinnedBrands.filter(b => b !== brand);
            showToast(brand + " retiré");
        } else {
            pinnedBrands.push(brand);
            showToast(brand + " épinglé");
        }
        localStorage.setItem('richardson_pinned', JSON.stringify(pinnedBrands));
        
        // Rafraîchissement intelligent
        if(document.getElementById('nav-fav').classList.contains('active')) renderPinned();
        else {
            const currentParts = breadcrumb.innerText.split(' / ');
            if(currentParts.length > 1 && db[capitalize(currentParts[1])]) renderBrands(capitalize(currentParts[1]));
        }
    }

    // Utilitaires
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }
    function setActiveLink(id) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = "> " + msg.toUpperCase();
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 2000);
    }
    function toggleTheme() {
        const b = document.body;
        const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', t);
    }
    function openModal(title) {
        document.getElementById("modalTitle").innerText = "DOCUMENT : " + title;
        document.getElementById("viewerModal").style.display = "flex";
    }
    function closeModal() { document.getElementById("viewerModal").style.display = "none"; }
    function toggleHelp() { showToast("Aide : Clic-droit pour épingler."); }

    function updateTime() {
        const now = new Date();
        document.getElementById("liveTime").innerText = now.toTimeString().split(' ')[0];
        document.getElementById("liveDate").innerText = now.toLocaleDateString('fr-FR', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'}).toUpperCase();
    }

    // Recherche Globale Avancée
    document.getElementById("globalSearch").addEventListener("input", function(e) {
        const q = e.target.value.toLowerCase();
        if(q.length < 2) { renderDomaines(); return; }
        
        app.innerHTML = "";
        Object.keys(db).forEach(dom => {
            Object.keys(db[dom]).forEach(brand => {
                if(brand.toLowerCase().includes(q) || dom.toLowerCase().includes(q)) {
                    const card = document.createElement("div");
                    card.className = "b-card";
                    card.innerHTML = `<div style="font-size:0.5rem; opacity:0.5">${dom.toUpperCase()}</div><h3>${brand}</h3>`;
                    card.onclick = () => renderFiles(dom, brand);
                    app.appendChild(card);
                }
            });
        });
    });

    setInterval(updateTime, 1000);
    updateTime();
    renderDomaines();
</script>

</body>
</html>
