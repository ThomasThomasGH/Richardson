<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHARDSON | B.P.O. NEON v5.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --primary: #001a33; --accent: #e30613;
            --text: #001a33; --border: #e0e0e0; --grid-color: rgba(0, 26, 51, 0.03);
            --online-green: #00ff88; --offline-red: #ff4444; --warning-orange: #ff9800;
            --neon-glow: transparent;
        }

        [data-theme="dark"] {
            --bg: #050505; --surface: #0a0a0a; --primary: #ffffff;
            --text: #ffffff; --border: #1a1a1a; --grid-color: rgba(255, 255, 255, 0.02);
            /* Couleurs Néon */
            --accent: #ff0015;
            --online-green: #00ff88;
            --offline-red: #ff3333;
            --warning-orange: #ffaa00;
            --neon-glow: 0 0 10px;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 !important; }
        
        body { 
            background-color: var(--bg);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; font-family: 'Inter', sans-serif; margin: 0; color: var(--text); min-height: 100vh;
        }

        /* --- EFFETS NÉONS (DARK MODE SEULEMENT) --- */
        [data-theme="dark"] .accent-neon { color: var(--accent); text-shadow: var(--neon-glow) var(--accent); }
        [data-theme="dark"] .dot.online { box-shadow: var(--neon-glow) var(--online-green); }
        [data-theme="dark"] .status-pill.valid { box-shadow: var(--neon-glow) var(--online-green); border: 1px solid var(--online-green); }
        [data-theme="dark"] .status-pill.obsolete { box-shadow: var(--neon-glow) var(--offline-red); border: 1px solid var(--offline-red); }
        [data-theme="dark"] .status-pill.recent { box-shadow: var(--neon-glow) var(--warning-orange); border: 1px solid var(--warning-orange); }
        [data-theme="dark"] .domain-line { box-shadow: var(--neon-glow) var(--line-color); }

        /* --- HEADER --- */
        header {
            height: 70px; background: var(--surface); border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; padding: 0 30px; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; text-decoration: none; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .logo::before { content: ''; width: 12px; height: 12px; background: var(--accent); [data-theme="dark"] & { box-shadow: var(--neon-glow) var(--accent); } }

        .search-container { flex-grow: 1; margin: 0 50px; }
        #globalSearch { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 10px 20px; 
            font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 0.75rem; outline: none;
        }
        #globalSearch:focus { border-color: var(--accent); [data-theme="dark"] & { box-shadow: inset var(--neon-glow) var(--accent); } }

        /* --- LAYOUT --- */
        .main-wrapper { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 70px); }

        aside { 
            border-right: 1px solid var(--border); background: var(--surface); padding: 30px;
            display: flex; flex-direction: column; position: sticky; top: 70px; height: calc(100vh - 70px);
        }

        .nav-link { 
            text-decoration: none; color: var(--primary); font-size: 0.7rem; font-weight: 700; 
            padding: 12px; margin-bottom: 5px; opacity: 0.4; cursor: pointer;
        }
        .nav-link.active { opacity: 1; color: var(--accent); [data-theme="dark"] & { text-shadow: var(--neon-glow) var(--accent); } }

        /* --- CONTENT --- */
        .content { padding: 40px; }
        .blueprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .b-card { 
            background: var(--surface); padding: 35px; cursor: pointer; display: flex; 
            flex-direction: column; border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .b-card:hover { border-color: var(--accent); transform: scale(1.02); z-index: 5; }
        [data-theme="dark"] .b-card:hover { box-shadow: var(--neon-glow) var(--accent); }
        
        .b-card h3 { font-size: 1.6rem; margin: 10px 0; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

        /* --- PILLS --- */
        .status-pill { font-family: 'JetBrains Mono'; font-size: 0.55rem; padding: 4px 10px; font-weight: 700; width: fit-content; margin-bottom: 15px; }
        .valid { background: var(--online-green); color: #000; }
        .obsolete { background: var(--offline-red); color: #fff; }
        .recent { background: var(--warning-orange); color: #000; }

        .domain-line { height: 4px; width: 40px; margin-bottom: 15px; background: var(--line-color); }

        /* --- STATUS BAR --- */
        #statusBar { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; font-family: 'JetBrains Mono'; }
        .dot { width: 8px; height: 8px; background: var(--online-green); display: inline-block; margin-right: 8px; border-radius: 50% !important; }
        [data-theme="dark"] .dot { animation: neonPulse 1.5s infinite alternate; }

        @keyframes neonPulse { from { opacity: 0.5; box-shadow: 0 0 2px var(--online-green); } to { opacity: 1; box-shadow: 0 0 12px var(--online-green); } }

        #toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: var(--surface);
            padding: 15px 25px; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
            z-index: 3000; border: 1px solid var(--accent); display: none;
            [data-theme="dark"] & { box-shadow: var(--neon-glow) var(--accent); }
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <a href="#" class="logo" onclick="renderDomaines()">RICHARDSON<span class="accent-neon">_B.P.O.</span></a>
    <div class="search-container">
        <input type="text" id="globalSearch" placeholder="SEARCH_SYSTEM_CORE...">
    </div>
    <div class="header-actions">
        <button class="action-btn" onclick="exportInventory()">Rapport</button>
        <button class="action-btn accent-neon" onclick="toggleTheme()" id="themeBtn">Dark_Mode</button>
    </div>
</header>

<div class="main-wrapper">
    <aside>
        <nav>
            <div id="nav-all" onclick="renderDomaines()" class="nav-link active">// INDEX_TOTAL</div>
            <div id="nav-fav" onclick="renderPinned()" class="nav-link">// FAVORIS</div>
        </nav>

        <div id="statusBar">
            <div style="font-size: 0.6rem; margin-bottom: 10px; opacity:0.6">STATION_MOUGINS_06</div>
            <div style="font-size: 0.7rem;"><div class="dot"></div> ONLINE</div>
            <div style="font-size: 0.8rem; font-weight: 700; margin-top:10px" id="liveTime">00:00:00</div>
        </div>
    </aside>
    
    <main class="content">
        <div id="app" class="blueprint-grid"></div>
    </main>
</div>

<div id="toast">ACTION_SUCCESSFUL</div>

<script>
    const db = {
        "Sanitaire": { color: "#00d4ff", brands: { "Grohe": ["2026", "2025"], "Hansgrohe": ["2026"], "Geberit": ["2024"], "Villeroy & Boch": ["2026"] }},
        "Chauffage": { color: "#ffaa00", brands: { "Viessmann": ["2026"], "De Dietrich": ["2025"], "Saunier Duval": ["2026"], "Atlantic": ["2026"] }},
        "Plomberie": { color: "#00ff88", brands: { "Nicoll": ["2025"], "Viega": ["2026"], "Watts": ["2024"] }}
    };

    let pinnedBrands = JSON.parse(localStorage.getItem('richardson_pinned')) || [];
    const app = document.getElementById("app");

    function renderDomaines() {
        app.innerHTML = "";
        Object.keys(db).forEach(dom => {
            const card = document.createElement("div");
            card.className = "b-card";
            card.style.setProperty('--line-color', db[dom].color);
            card.innerHTML = `
                <div class="domain-line"></div>
                <div style="font-family:'JetBrains Mono'; font-size:0.55rem; opacity:0.5">UNIV_ID_${dom.toUpperCase()}</div>
                <h3 style="color:${db[dom].color}; text-shadow: var(--neon-glow) ${db[dom].color}">${dom}</h3>
            `;
            card.onclick = () => renderBrands(dom);
            app.appendChild(card);
        });
    }

    function renderBrands(dom) {
        app.innerHTML = `<div class="b-card" onclick="renderDomaines()" style="border-color:var(--accent);"><h3 class="accent-neon">⬅ RETOUR</h3></div>`;
        Object.keys(db[dom].brands).forEach(brand => {
            const isPinned = pinnedBrands.includes(brand);
            const card = document.createElement("div");
            card.className = `b-card ${isPinned ? 'is-pinned' : ''}`;
            card.innerHTML = `
                <div style="font-family:'JetBrains Mono'; font-size:0.55rem; opacity:0.5">BRAND_CORE</div>
                <h3 style="${isPinned ? 'color:var(--accent); text-shadow:var(--neon-glow) var(--accent);' : ''}">${brand}</h3>
                ${isPinned ? '<div class="status-pill recent">ÉPINGLÉ</div>' : ''}
            `;
            card.onclick = () => renderFiles(dom, brand);
            card.oncontextmenu = (e) => { e.preventDefault(); togglePin(brand, dom); };
            app.appendChild(card);
        });
    }

    function renderFiles(dom, brand) {
        app.innerHTML = `<div class="b-card" onclick="renderBrands('${dom}')" style="border-color:var(--accent);"><h3 class="accent-neon">⬅ RETOUR</h3></div>`;
        db[dom].brands[brand].forEach(year => {
            const isRecent = parseInt(year) >= 2026;
            const card = document.createElement("div");
            card.className = "b-card";
            card.innerHTML = `
                <div class="status-pill ${isRecent ? 'valid' : 'obsolete'}">${isRecent ? 'DERNIÈRE ÉDITION' : 'ARCHIVE'}</div>
                <h3>EDITION ${year}</h3>
                <div style="font-family:'JetBrains Mono'; font-size:0.6rem; opacity:0.5; margin-top:10px">ID: ${brand.toUpperCase()}_${year}</div>
            `;
            app.appendChild(card);
        });
    }

    function togglePin(brand, dom) {
        if(pinnedBrands.includes(brand)) pinnedBrands = pinnedBrands.filter(b => b !== brand);
        else pinnedBrands.push(brand);
        localStorage.setItem('richardson_pinned', JSON.stringify(pinnedBrands));
        renderBrands(dom);
        showToast("Favoris mis à jour");
    }

    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById("themeBtn").innerText = isDark ? "Light_Mode" : "Dark_Mode";
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = "> " + msg.toUpperCase();
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
    }

    function updateTime() {
        document.getElementById("liveTime").innerText = new Date().toTimeString().split(' ')[0];
    }

    setInterval(updateTime, 1000);
    updateTime();
    renderDomaines();
</script>
</body>
</html>
